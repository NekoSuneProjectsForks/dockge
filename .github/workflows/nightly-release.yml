name: Nightly Release

on:
  schedule:
    # Runs at 2:00 AM UTC every day
    - cron: "0 2 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions: {}

jobs:
  release-nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    env:
      # Exposed so steps can detect whether Docker Hub credentials are
      # configured for this repository (forks usually don't have them).
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only attempt the Docker Hub login when both secrets are present,
      # otherwise docker/login-action fails the whole job with
      # "Username and password required".
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm clean-install --no-fund

      - name: Build frontend
        run: npm run build:frontend

      # Always publish to GHCR (uses the automatic GITHUB_TOKEN). Add the
      # Docker Hub tag only when Docker Hub credentials are configured.
      - name: Compute image tags
        id: tags
        run: |
          TAGS="ghcr.io/nekosuneprojects/dockge:nightly"
          if [ -n "${DOCKERHUB_USERNAME}" ] && [ -n "${DOCKERHUB_TOKEN}" ]; then
            TAGS="${TAGS},chisdealhdyt/dockge:nightly"
          else
            echo "::notice::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set - skipping Docker Hub push, publishing to GHCR only."
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push nightly image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: nightly
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.tags.outputs.tags }}
